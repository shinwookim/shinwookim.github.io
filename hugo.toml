baseURL = "https://shinwookim.github.io/"
locale = "en-US"
title = "Shinwoo Kim"

[params]
author = "Shinwoo Kim"
email = "shinwookim@proton.me"
description = "I am a software developer based in Pittsburgh who is interested in computer architecture, distributed/operating systems, and compilers."
jobTitle = """
<s>Software Engineer</s><br /><a
    href="https://en.wikipedia.org/wiki/Conscription_in_South_Korea">Enlisted
    Soldier</a>"""
company = "Republic of Korea Army"
twitter = "_shinwookim"
github = "shinwookim"
linkedin = "kimshinwoo"
keybase = "shinwookim"
google_analytics = "G-X43BZS6F4C"

[params.mastodon]
handle = "shinwoo"
instance = "discuss.systems"

[[menus.main]]
name = "Home"
pageRef = "/"
weight = 10

[[menus.main]]
name = "Projects"
pageRef = "/projects"
weight = 20

[[menus.main]]
name = "Résumé"
pageRef = "/resume"
weight = 30

[[menus.main]]
name = "Connect"
pageRef = "/connect-with-me"
weight = 40

[build.buildStats]
enable = true

[[build.cachebusters]]
source = "assets/notwatching/hugo_stats\\.json"
target = "css"

[[build.cachebusters]]
source = "(postcss|tailwind)\\.config\\.js"
target = "css"

[module.hugoVersion]
extended = false
min = "0.146.0"

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
disableWatch = true
source = "hugo_stats.json"
target = "assets/notwatching/hugo_stats.json"


[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      attr = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'