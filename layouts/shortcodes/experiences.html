{{ range hugo.Data.experience }}
<div class="grid grid-cols-1 sm:grid-cols-[140px_1fr] gap-x-4 items-baseline">

  <div class="font-bold whitespace-nowrap">
    {{ if eq .start_year .end_year }}
    {{ .start_year }}.
    {{ else }}
    {{ .start_year }} – {{ .end_year }}.
    {{ end }}
  </div>

  <div markdown="1" class="[&>*]:my-0">
    {{ .title | markdownify }}, {{ .company | markdownify }}
  </div>

</div>
{{ end }}
